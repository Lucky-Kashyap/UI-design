# Next.js static export (output: "export", trailingSlash: true)
# Publish directory: out/

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# --- Rewrites (status 200): serve index.html without changing the browser URL ---

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/themes/"
  to = "/themes/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/themes/:theme/"
  to = "/themes/:theme/index.html"
  status = 200
  force = true

# Theme routes without trailing slash (e.g. /themes/horizon)
[[redirects]]
  from = "/themes"
  to = "/themes/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/themes/:theme"
  to = "/themes/:theme/index.html"
  status = 200
  force = true

# Other pre-rendered directory routes (trailing slash)
[[redirects]]
  from = "/:path/"
  to = "/:path/index.html"
  status = 200
  force = true

# Canonical trailing slash (matches next.config trailingSlash: true)
[[redirects]]
  from = "/:path"
  to = "/:path/"
  status = 301
  force = true
  conditions = {Path = ["!/*.*", "!/_next/*"]}

# 404 fallback for routes with no matching static file
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
